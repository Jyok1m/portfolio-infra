---
- name: Création du répertoire de déploiement
  ansible.builtin.file:
    path: "{{ app_base_path }}/portfolio"
    state: directory
    mode: "0755"

- name: Application du template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_base_path }}/portfolio/docker-compose.yml"
    mode: "0644"
  no_log: true

- name: Lancement des services
  community.docker.docker_compose_v2:
    project_src: "{{ app_base_path }}/portfolio"
    state: present
    pull: missing
    remove_orphans: true

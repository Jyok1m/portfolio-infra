---
# https://slash-root.fr/debian-configuration-complete-dunattended-upgrades-pour-une-securite-sans-effort/
- name: Installation via APT
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present

- name: Application du template de configuration de MAJ auto
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    backup: yes # avec backup (OKAZOU)

- name: Application du template de configuration globale
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
    backup: yes # avec backup (OKAZOU)

---
- name: Création du répertoire de déploiement
  ansible.builtin.file:
    path: "{{ app_base_path }}/traefik"
    state: directory
    mode: "0755"

- name: Création du ACME.json (si manquant) pour Traefik
  ansible.builtin.file:
    path: "{{ data_base_path }}/traefik/acme.json"
    state: touch
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Application du template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_base_path }}/traefik/docker-compose.yml"
    mode: "0644"
  no_log: true

- name: Lancement des services
  community.docker.docker_compose_v2:
    project_src: "{{ app_base_path }}/traefik"
    state: present
    pull: missing
    remove_orphans: true
    wait: true
    wait_timeout: 120
